<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Create Student</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
	<nav class="navbar navbar-expand-md bg-dark navbar-dark">

    <!-- Brand -->
    <a class="navbar-brand" href="#">Student Management System</a>

    <!-- Toggle Button -->
    <button class="navbar-toggler" type="button"
            data-toggle="collapse"
            data-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar Links -->
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">

            <li class="nav-item">
                <a class="nav-link" th:href="@{/students}">
                    Student Management
                </a>
            </li>

        </ul>
    </div>

</nav>

<div class="container">
    <div class="row">
        <div class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card mt-5">
            
            <div class="text-center" style="font-size: 30px;">Update Student</div>
            <div class="card-body"></div>
            
            <form th:action="@{/students/edit/{id}(id=${student.id})}" th:object="${student}" method="post">
                
                <div class="form-group mb-3">
                    <label>Student First Name</label> 
                    <input type="text" name = "firstname" class="form-control" th:field="*{firstname}"
                           placeholder="Enter Student FirstName">
                </div>

                <div class="form-group mb-3">
                    <label>Student last Name</label> 
                    <input type="text" name = "lastname" class="form-control" th:field="*{lastname}"
                           placeholder="Enter Student lastName">
                </div>

                <div class="form-group mb-3">
                    <label>Student Email </label> 
                    <input type="email" name = "email"
                           class="form-control" th:field="*{email}"
                           placeholder="Enter Student Email">
                </div>
                
                <div class="text-center mb-3">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
